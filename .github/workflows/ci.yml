name: CI

on:
  push:
    branches: [main, dev_ENG]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (dev + chatbot + vector + ml extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml tiktoken httpx pandas pydantic-settings python-dotenv tenacity

      - name: Ruff (lint + format check)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Pytest (unit only — integration tests need ML models / FAISS index)
        env:
          SCINANO_LOG_LEVEL: WARNING
        run: pytest -m unit --cov=scinanoai --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
