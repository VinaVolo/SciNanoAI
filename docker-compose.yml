services:
  vector_service:
    build:
      context: .
      dockerfile: docker/vector.Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    container_name: scinanoai-vector
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Surface HF Hub / transformers / langchain log lines during the long
      # first-run model download. Override via .env if too verbose.
      - SCINANO_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_VERBOSITY=info
      - HF_HUB_VERBOSITY=info
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - TQDM_MININTERVAL=2
    volumes:
      - ./db:/app/db:ro
      - hf_cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://127.0.0.1:8000/health', timeout=3.0).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      # On first run we need to download intfloat/multilingual-e5-large
      # (~2 GB) from Hugging Face Hub before /health responds. Override via
      # the VECTOR_START_PERIOD env-var if your network is even slower.
      start_period: 900s
    restart: unless-stopped
    networks:
      - scinanoai_net

  chatbot_api:
    build:
      context: .
      dockerfile: docker/chatbot.Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    container_name: scinanoai-chatbot
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - VECTOR_SERVICE_URL=http://vector_service:8000
      - SCINANO_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_VERBOSITY=info
      - HF_HUB_VERBOSITY=info
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - TQDM_MININTERVAL=2
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - hf_cache:/home/appuser/.cache/huggingface
    depends_on:
      vector_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://127.0.0.1:8001/health', timeout=3.0).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      # The DecomposerAgent loads a zero-shot classifier (mDeBERTa, ~700 MB)
      # eagerly inside the FastAPI lifespan — that's a first-run download
      # over the same HF Hub.
      start_period: 600s
    restart: unless-stopped
    networks:
      - scinanoai_net

  chatbot_ui:
    build:
      context: .
      dockerfile: docker/chatbot.Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    container_name: scinanoai-ui
    command: ["python", "-m", "scinanoai.chatbot.ui"]
    ports:
      - "8517:8517"
    env_file:
      - .env
    environment:
      - CHAT_API_URL=http://chatbot_api:8001
      - GRADIO_ANALYTICS_ENABLED=False
    depends_on:
      chatbot_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://127.0.0.1:8517/', timeout=3.0).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - scinanoai_net

networks:
  scinanoai_net:
    driver: bridge

volumes:
  # Persists the Hugging Face model cache across container recreations so the
  # 2 GB embedding model and the 700 MB decomposer are downloaded only once.
  hf_cache:
